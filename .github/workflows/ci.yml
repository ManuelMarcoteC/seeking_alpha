name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel an in-flight run when a new commit is pushed to the same ref
# (saves billed minutes on a private repo).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: ruff + pytest (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e . --no-deps

      - name: Lint (ruff)
        run: ruff check src tests

      # The offline suite is the default (pyproject addopts: -m 'not live').
      # FinBERT/Anthropic extras are NOT installed: every heavy import is lazy
      # and mocked in tests, so CI stays fast and network-free.
      - name: Tests (offline suite)
        run: pytest
